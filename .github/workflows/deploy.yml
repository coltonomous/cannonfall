name: Deploy Cannonfall

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: BUILD_NUMBER=${{ github.run_number }} pnpm build
      - run: sed -i "s/cannonfall-v1/cannonfall-v${{ github.run_number }}/" dist/sw.js

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get runner IP
        id: ip
        run: echo "addr=$(curl -s https://ifconfig.me)" >> "$GITHUB_OUTPUT"

      - name: Open SSH for runner
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.addr }}/32

      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 400 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /opt/cannonfall && sudo chown ec2-user:ec2-user /opt/cannonfall"

          rsync -avz --exclude node_modules --exclude .git --exclude .env \
            -e "ssh -i key.pem -o StrictHostKeyChecking=no" \
            ./ ec2-user@${{ secrets.EC2_HOST }}:/opt/cannonfall/

          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} bash -s <<'EOF'
          set -e

          cd /opt/cannonfall
          docker image prune -f
          docker compose build
          docker compose down
          docker compose up -d

          # Wait for health check
          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed" && docker compose logs --tail 20 && exit 1
          EOF

          rm -f key.pem

      - name: Close SSH for runner
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.addr }}/32 \
            2>/dev/null || true
